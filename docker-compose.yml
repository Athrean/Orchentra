services:
  server:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./orchentra.yml:/app/orchentra.yml:ro
      - orchentra-data:/app/data
    environment:
      - DATABASE_URL=/app/data/orchentra.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  orchentra-data:
