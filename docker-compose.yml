services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: orchentra
      POSTGRES_PASSWORD: orchentra
      POSTGRES_DB: orchentra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orchentra']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./orchentra.yml:/app/orchentra.yml:ro
    environment:
      - DATABASE_URL=postgresql://orchentra:orchentra@postgres:5432/orchentra

volumes:
  pgdata:
