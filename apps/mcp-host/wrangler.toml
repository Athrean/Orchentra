name = "orchentra-mcp-host"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Per-org session storage. The Durable Object class lives in
# src/durable-objects/session.ts and holds approval state + transient
# per-session metadata so we don't have to round-trip a database for
# every MCP request.
[[durable_objects.bindings]]
name = "ORG_SESSION"
class_name = "OrgSession"

[[migrations]]
tag = "v1"
new_classes = ["OrgSession"]

# Smoke deploy mode. Real deploys override these via `wrangler deploy --env <env>`.
[vars]
ORCHENTRA_MCP_NAME = "orchentra-mcp"
ORCHENTRA_MCP_VERSION = "0.1.0"
