name: Publish CLI package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run validation and npm pack only
        required: true
        type: boolean
        default: true
      npm_tag:
        description: npm dist-tag for a real publish
        required: true
        type: choice
        default: alpha
        options:
          - alpha
          - beta
          - latest

permissions:
  contents: read

jobs:
  publish-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package dry run
        run: bun run --cwd apps/cli package:dry-run

      - name: Publish package
        if: ${{ inputs.dry_run == false }}
        run: npm publish --workspace apps/cli --tag "${{ inputs.npm_tag }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
