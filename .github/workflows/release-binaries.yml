name: Release binaries

# Tag-triggered: on `git push` of a `v*` tag, compile the four standalone
# binaries, checksum them, and attach them (plus checksums.txt) to that tag's
# GitHub release. Re-running on the same tag re-uploads with --clobber.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-binaries:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binaries
        working-directory: apps/cli
        run: ./scripts/build-binaries.sh

      - name: Checksum binaries
        working-directory: apps/cli/dist
        run: sha256sum orchentra-* > checksums.txt

      - name: Publish binaries to the release
        working-directory: apps/cli/dist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          assets=(orchentra-darwin-arm64 orchentra-darwin-x64 orchentra-linux-arm64 orchentra-linux-x64 checksums.txt)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --title "$TAG" --generate-notes
          fi
